name: Deploy to HuggingFace Spaces

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy_hf.yml"

jobs:
  test:
    name: Run Backend Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Run test suite
        env:
          GEMINI_API_KEY: ""
          MAX_CONCURRENT_JOBS: "2"
        run: |
          pytest backend/tests/ \
            -v \
            --tb=short \
            --junitxml=test-results.xml \
            -p no:warnings

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml
          retention-days: 14

  deploy:
    name: Push backend to HF Spaces
    runs-on: ubuntu-latest
    needs: test  # only runs if tests pass

    steps:
      - name: Checkout repository (with LFS)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Load ISOCOURT_INFERENCE_CATEGORY for deploy (from CLI-managed file)
        run: |
          f="${{ github.workspace }}/backend/deploy/ci_inference_category"
          if [[ -f "$f" ]]; then
            c=$(tr -d '[:space:]' < "$f" | head -c 128)
            echo "ISOCOURT_INFERENCE_CATEGORY=$c" >> "$GITHUB_ENV"
            echo "Deploy: ISOCOURT_INFERENCE_CATEGORY=$c (from backend/deploy/ci_inference_category)"
          else
            echo "Deploy: no backend/deploy/ci_inference_category — using inference_selection.json only."
            echo "Run: cd backend && python3 -m api.inference_model_cli set <category>"
          fi

      - name: Install git-lfs
        run: |
          sudo apt-get install -y git-lfs
          git lfs install

      - name: Configure SSH for HuggingFace
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HF_SSH_KEY }}

      - name: Add hf.co to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan hf.co >> ~/.ssh/known_hosts

      # LFS blob transfers always use HTTPS even when git uses SSH.
      # We configure git credentials so LFS can authenticate for push.
      - name: Configure git credentials for LFS (HTTPS)
        run: |
          git config --global credential.helper store
          echo "https://${{ secrets.HF_USERNAME }}:${{ secrets.HF_TOKEN }}@huggingface.co" >> ~/.git-credentials

      # Clone HF repo but skip downloading LFS blobs — we have our own
      # model files from the checkout above and will push them ourselves.
      - name: Clone HuggingFace Space (skip LFS download)
        env:
          GIT_LFS_SKIP_SMUDGE: "1"
        run: |
          git clone git@hf.co:spaces/navneethdg/BadCoach hf_space
          cd hf_space
          git lfs install

      - name: Sync backend files into HF Space (minimal inference tree)
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='venv/' \
            --exclude='tests/' \
            --exclude='.env' \
            --exclude='__pycache__/' \
            --exclude='*.pyc' \
            --exclude='._*' \
            --exclude='.gitignore' \
            --exclude='requirements.txt' \
            --exclude='pipelines/' \
            --exclude='data/' \
            --exclude='mlruns/' \
            --exclude='wandb/' \
            --exclude='.pytest_cache/' \
            --exclude='.mypy_cache/' \
            --exclude='.ruff_cache/' \
            --exclude='htmlcov/' \
            --exclude='*.egg-info/' \
            --exclude='*.ipynb' \
            --exclude='models/*.pth' \
            --exclude='models/pose_cache_mediapipe.pt' \
            --exclude='models/pose_cache_staeformer.pt' \
            --exclude='core/training_progress.py' \
            --exclude='core/staeformer.py' \
            --exclude='core/seed_utils.py' \
            --exclude='core/split.py' \
            backend/ hf_space/

      - name: Copy dataset metadata JSON only (no bulk data/)
        run: |
          mkdir -p hf_space/data
          cp backend/data/transformed_combined_rounds_output_en_evals_translated.json hf_space/data/

      - name: Copy only the inference checkpoint (registry + inference_selection)
        run: |
          python3 << 'PY'
          import os
          import shutil
          import sys

          root = os.environ.get("GITHUB_WORKSPACE", ".")
          backend = os.path.join(root, "backend")
          hf = os.path.join(root, "hf_space")
          sys.path.insert(0, backend)

          from core.model_registry import (
              load_registry_file,
              resolve_inference_model_path,
          )

          src_models = os.path.join(backend, "models")
          reg = load_registry_file(os.path.join(src_models, "model_registry.json"))
          path = resolve_inference_model_path(src_models, reg)
          if not path or not os.path.isfile(path):
              raise SystemExit(
                  "Deploy: could not resolve a single inference .pth. "
                  "Commit backend/models/inference_selection.json (or set ISOCOURT_INFERENCE_CATEGORY for the job)."
              )
          dest_dir = os.path.join(hf, "models")
          os.makedirs(dest_dir, exist_ok=True)
          dest = os.path.join(dest_dir, os.path.basename(path))
          shutil.copy2(path, dest)
          print("HF Space will ship this weight only:", os.path.basename(path), "<-", path)
          PY

      - name: Strip per-epoch checkpoints from Space (if any)
        run: |
          find hf_space/models -maxdepth 1 -name '*_epoch_*.pth' -print -delete

      - name: Prune Space to inference primary + slim registry (HF LFS quota)
        run: |
          python3 << 'PY'
          import glob
          import json
          import os
          import sys

          hf = os.path.join(os.environ.get("GITHUB_WORKSPACE", "."), "hf_space")
          sys.path.insert(0, hf)
          from core.model_registry import (
              default_registry_v2,
              load_registry_file,
              primary_entry_for_category,
              resolve_inference_category,
              resolve_inference_model_path,
          )

          models_dir = os.path.join(hf, "models")
          reg_path = os.path.join(models_dir, "model_registry.json")
          reg = load_registry_file(reg_path)
          path = resolve_inference_model_path(models_dir, reg)
          if not path or not os.path.isfile(path):
              raise SystemExit(
                  "Could not resolve inference checkpoint (primary only). "
                  "Set backend/models/inference_selection.json category or ISOCOURT_INFERENCE_CATEGORY."
              )
          active = os.path.basename(path)
          cat = resolve_inference_category(models_dir, reg)
          pri = primary_entry_for_category(reg, cat)
          if not pri:
              raise SystemExit(f"No primary entry for inference category {cat!r}")

          for p in glob.glob(os.path.join(models_dir, "*.pth")):
              if os.path.basename(p) != active:
                  os.remove(p)
                  print("removed", os.path.basename(p))
          for p in glob.glob(os.path.join(models_dir, "*.pt")):
              os.remove(p)
              print("removed", os.path.basename(p))

          slim = default_registry_v2()
          slim["models"]["architectures"][cat]["primary"] = pri
          with open(reg_path, "w", encoding="utf-8") as f:
              json.dump(slim, f, indent=2)
          print("Space models:", os.listdir(models_dir))
          PY

      - name: Verify model files are LFS-tracked (not raw blobs)
        run: |
          cd hf_space
          git add -A
          echo "--- LFS-tracked files ---"
          git lfs ls-files
          # Fail if any model file is staged as a raw blob instead of LFS pointer
          for f in models/*.pth models/*.pt models/*.task; do
            [ -f "$f" ] || continue
            if ! git lfs ls-files | grep -q "$(basename $f)"; then
              echo "ERROR: $f is NOT tracked by LFS — check .gitattributes"
              exit 1
            fi
          done
          echo "All model files are properly LFS-tracked ✓"

      - name: Commit and push to HuggingFace
        run: |
          cd hf_space
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
          else
            git commit -m "Deploy: $(date -u '+%Y-%m-%d %H:%M UTC') — ${{ github.sha }}"
            git push origin main
          fi
